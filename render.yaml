databases:
  - name: teamfinder-db
    plan: free
    databaseName: team_finder
    user: team_finder

services:
  - type: web
    name: teamfinder
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn team_finder.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: teamfinder-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "3600"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: TASK_VERSION
        value: "3"
      - key: SERVE_MEDIA_FILES
        value: "True"
      - key: PYTHON_VERSION
        value: "3.13.0"
